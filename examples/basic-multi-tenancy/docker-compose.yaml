version: "3"
services:
  #
  # Databases
  #
  project1:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: "directus"
      MYSQL_USER: "directus"
      MYSQL_PASSWORD: "directus"
      MYSQL_ROOT_PASSWORD: "directus"
    #ports: # Expose it if you want to access this MySQL server on port 3306
    #  - 3306:3306
    networks:
      - databases

  project2:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: "directus"
      MYSQL_USER: "directus"
      MYSQL_PASSWORD: "directus"
      MYSQL_ROOT_PASSWORD: "directus"
    #ports: # Expose it if you want to access this MySQL server on port 3307
    #  - 3307:3306
    networks:
      - databases

  #
  # Directus
  #
  directus:
    image: directus/directus:v8-apache
    ports:
      - 8443:443
      # for version < v8.7.2
      # - 80:80
    environment:
      # Disables environment loading (required)
      DIRECTUS_USE_ENV: "0"
    volumes:
      - ./data/config:/var/directus/config
      - ./data/uploads:/var/directus/public/uploads
      # to apply your custom ssl cert/key pair
      # - ./path/to/server.crt:/etc/apache2/ssl/server.crt
      # - ./path/to/server.key:/etc/apache2/ssl/server.key
    networks:
      - databases

networks:
  databases:
